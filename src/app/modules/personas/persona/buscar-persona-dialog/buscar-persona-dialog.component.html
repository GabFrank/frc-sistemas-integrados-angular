<div class="container" style="width:100%; height: 100%;">
  <div fxLayout="column" style="height: 100%; padding: 10px;" fxLayoutGap="10px">
    <!-- Título centrado -->
    <div style="width: 100%; text-align: center;">
      <h3 style="margin: 0;">Buscar persona</h3>
    </div>
    
    <!-- Barra de búsqueda -->
    <div fxLayout="row" style="width: 100%;" fxLayoutGap="10px">
      <div fxFlex="80%" style="width: 100%">
        <mat-form-field style="width: 100%">
          <mat-label>Buscar</mat-label>
          <input
            #buscarInput
            matInput
            placeholder=""
            autocomplete="off"
            [formControl]="buscarControl"
            oninput="(this.value == ' ') ? this.value = null : null ;this.value = this.value.toUpperCase()"
            (keydown.enter)="onSearchPersona(buscarControl.value)"
          />
        </mat-form-field>
      </div>
      <div fxFlex="20%" fxLayout="column" fxLayoutGap="10px">
        <button mat-raised-button color="primary" style="width: 100%" (click)="onSearchPersona(buscarControl.value)">
          Buscar
        </button>
        <button mat-raised-button color="primary" style="width: 100%" (click)="onAdicionar()">
          + Adicionar
        </button>
      </div>
    </div>
    
    <!-- Tabla -->
    <div fxFlex fxLayout="column" fxLayoutAlign="space-between start" style="min-height: 300px;">
      <div fxFlex style="width: 100%; overflow: auto; min-height: 300px;">
        <table
          mat-table
          [dataSource]="dataSource"
          class="mat-elevation-z8"
          style="width: 100%"
        >
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef style="text-align: center;">Id</th>
            <td mat-cell *matCellDef="let persona" style="text-align: center;">{{ persona.id }}</td>
          </ng-container>

          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef style="text-align: start;">Nombre</th>
            <td mat-cell *matCellDef="let persona" style="text-align: start;">
              {{ persona.nombre | uppercase }}
            </td>
          </ng-container>

          <ng-container matColumnDef="documento">
            <th mat-header-cell *matHeaderCellDef style="text-align: end;">Documento</th>
            <td mat-cell *matCellDef="let persona" style="text-align: end;">
              {{ persona?.documento | uppercase }}
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns" style="height: 48px;"></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns; let i = dataIndex"
            [class.selected]="selectedRowIndex == i"
            (click)="onSelectRow(row, i)"
            (keydown.enter)="onSelectRow(row, i); $event.stopPropagation()"
            class="tableRows"
            tabindex="0"
            style="height: 48px; cursor: pointer;"
          ></tr>
        </table>
      </div>
      
      <!-- Paginación -->
      <mat-paginator
        *ngIf="selectedPageInfo"
        itemsPerPageLabel="Items per page:"
        [pageSizeOptions]="[15, 25, 50, 100]"
        (page)="handlePageEvent($event)"
        [length]="selectedPageInfo?.getTotalElements || 0"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        style="width: 100%"
        showFirstLastButtons
      ></mat-paginator>
      
      <!-- Botones de acción -->
      <div style="width: 100%; text-align: center; margin-top: 20px;">
        <button mat-raised-button (click)="onCancelar()" color="warn" style="width: 200px; margin-right: 20px;">
          Cancelar
        </button>
        <button mat-raised-button (click)="onAceptar()" [disabled]="selectedPersona == null" style="width: 200px; background-color: #424242; color: white;">
          Aceptar
        </button>
      </div>
    </div>
  </div>
</div>
