<div class="container" style="width:100%; height: 100%;">
  <div fxLayout="column" style="height: 100%;">
    <div style="text-align: center">
      <h3>Buscar Persona</h3>
    </div>

    <div fxLayout="row" fxLayoutGap="10px" fxLayoutAlign="start center">
      <mat-form-field fxFlex appearance="outline">
        <mat-label>Buscar por nombre o documento</mat-label>
        <input #buscarInput matInput placeholder="Ingresar texto..." autocomplete="off" [formControl]="buscarControl"
          (keydown.enter)="onSearch()" />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </div>

    <div class="table-container" fxFlex style="overflow: auto; margin-top: 10px;">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width: 100%;">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef style="width: 10%; text-align: center;">Id</th>
          <td mat-cell *matCellDef="let persona" style="text-align: center;">{{ persona.id }}</td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef style="width: 60%; text-align: start;">Nombre</th>
          <td mat-cell *matCellDef="let persona" style="text-align: start;">
            {{ persona.nombre | titlecase }}
          </td>
        </ng-container>

        <ng-container matColumnDef="documento">
          <th mat-header-cell *matHeaderCellDef style="width: 30%; text-align: center;">Documento</th>
          <td mat-cell *matCellDef="let persona" style="text-align: center;">
            {{ persona?.documento | uppercase }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns" [class.selected]="selectedRow === row"
          (click)="onSelectRow(row)" (keydown.enter)="onSelectRow(row)" tabindex="0" style="cursor: pointer;"></tr>
      </table>
    </div>

    <div fxLayout="row" fxLayoutAlign="end center" style="margin-top: 15px;" fxLayoutGap="10px">
      <button mat-button (click)="onCancelar()">Cancelar</button>
    </div>
  </div>
</div>
