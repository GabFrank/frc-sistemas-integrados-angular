<div fxLayout="column" style="width: 100%; height: 100%; margin-top: 10px; margin-bottom: 10px;">
  <h3 style="text-align: center; margin-bottom: 0px;">Crear Notificación Personalizada</h3>
  <br />

  <div fxLayout="row" fxLayoutAlign="center center" style="margin-bottom: 20px;">
    <mat-radio-group [(ngModel)]="tipoEnvio" (ngModelChange)="validarFormulario()" fxLayout="row" fxLayoutGap="20px">
      <mat-radio-button value="todos">Todos los Usuarios</mat-radio-button>
      <mat-radio-button value="especificos">Usuarios Específicos</mat-radio-button>
    </mat-radio-group>
  </div>

  <div *ngIf="tipoEnvio === 'especificos'" fxLayout="row" fxLayoutAlign="center center">
    <mat-form-field style="width: 90%" class="form-element">
      <mat-label>Seleccionar usuarios</mat-label>
      <mat-chip-grid #chipGrid aria-label="Seleccion de usuarios">
        <mat-chip-row *ngFor="let usuario of selectedUsuarios" (removed)="removerUsuario(usuario)">
          {{usuario.nickname}}
          <button matChipRemove [attr.aria-label]="'remove ' + usuario.nickname">
            <mat-icon>cancel</mat-icon>
          </button>
        </mat-chip-row>
        <input placeholder="Buscar usuario..." [matChipInputFor]="chipGrid" (click)="onBuscarUsuario()"
          (keyup.enter)="onBuscarUsuario()" readonly />
      </mat-chip-grid>
      <mat-icon matSuffix (click)="onBuscarUsuario()" style="cursor: pointer">search</mat-icon>
    </mat-form-field>
  </div>

  <div fxLayout="row" fxLayoutAlign="center center">
    <mat-form-field style="width: 90%" class="form-element">
      <mat-label class="required-field">Título</mat-label>
      <input matInput [(ngModel)]="titulo" (ngModelChange)="validarFormulario()" maxlength="100" />
      <mat-hint align="end">{{titulo.length}} / 100</mat-hint>
    </mat-form-field>
  </div>

  <div fxLayout="row" fxLayoutAlign="center center">
    <mat-form-field style="width: 90%" class="form-element">
      <mat-label class="required-field">Mensaje</mat-label>
      <textarea matInput [(ngModel)]="mensaje" (ngModelChange)="validarFormulario()" rows="4"
        maxlength="500"></textarea>
      <mat-hint align="end">{{mensaje.length}} / 500</mat-hint>
    </mat-form-field>
  </div>
  <br />

  <div fxLayout="row" fxLayoutAlign="center center" fxLayoutGap="20px" style="width: 100%">
    <div fxFlex="20">
      <button style="width: 100%" mat-raised-button color="primary" type="button" (click)="onCancelar()"
        [disabled]="enviando">
        Cancelar
      </button>
    </div>
    <div fxFlex="20">
      <button style="width: 100%" mat-raised-button color="accent" type="button" [disabled]="botonEnviarDeshabilitado"
        (click)="onEnviar()">
        <mat-spinner diameter="20" *ngIf="enviando"
          style="display:inline-block; vertical-align:middle; margin-right: 5px;"></mat-spinner>
        <span *ngIf="!enviando">Enviar</span>
        <span *ngIf="enviando">Enviando...</span>
      </button>
    </div>
  </div>
</div>
