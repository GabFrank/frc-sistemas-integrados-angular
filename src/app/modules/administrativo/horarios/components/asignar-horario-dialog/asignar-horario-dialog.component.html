<app-generic-list titulo="Asignar Horario" [isAdicionar]="false" [isMenu]="false">
    <div filtros fxLayout="row" fxLayoutAlign="start center" fxLayoutGap="10px" style="width: 100%; height: 100%">
        <mat-form-field fxFlex="25">
            <mat-label>Entrada</mat-label>
            <input matInput [ngxTimepicker]="pickerEntrada" [format]="24" [formControl]="entradaControl" readonly>
            <ngx-material-timepicker #pickerEntrada></ngx-material-timepicker>
        </mat-form-field>

        <mat-form-field fxFlex="25">
            <mat-label>Salida</mat-label>
            <input matInput [ngxTimepicker]="pickerSalida" [format]="24" [formControl]="salidaControl" readonly>
            <ngx-material-timepicker #pickerSalida></ngx-material-timepicker>
        </mat-form-field>

        <mat-form-field fxFlex="20">
            <mat-label>Turno</mat-label>
            <mat-select [formControl]="turnoControl">
                <mat-option *ngFor="let turno of listaTurnos" [value]="turno.code">
                    {{ turno.name }}
                </mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field fxFlex="20">
            <mat-label>Días</mat-label>
            <mat-select [formControl]="diasControl" multiple>
                <mat-option *ngFor="let dia of diasSemana" [value]="dia.value">
                    {{ dia.viewValue }}
                </mat-option>
            </mat-select>
        </mat-form-field>

        <div fxFlex fxLayout="row" fxLayoutAlign="end center" fxLayoutGap="10px">
            <button mat-button (click)="onCancelar()">
                Cancelar
            </button>
            <button mat-raised-button color="primary" (click)="onAgregarHorario()">
                Agregar
            </button>
            <button mat-raised-button color="primary" (click)="onGuardar()">
                Guardar
            </button>
        </div>
    </div>

    <div table style="height: 100%; background-color: rgb(70, 70, 70)" fxLayout="column"
        fxLayoutAlign="space-between start">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width: 100%">

            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef> Id </th>
                <td mat-cell *matCellDef="let element"> {{element.id}} </td>
            </ng-container>

            <ng-container matColumnDef="entrada">
                <th mat-header-cell *matHeaderCellDef> Entrada </th>
                <td mat-cell *matCellDef="let element"> {{element.entrada}} </td>
            </ng-container>

            <ng-container matColumnDef="salida">
                <th mat-header-cell *matHeaderCellDef> Salida </th>
                <td mat-cell *matCellDef="let element"> {{element.salida}} </td>
            </ng-container>

            <ng-container matColumnDef="dias">
                <th mat-header-cell *matHeaderCellDef> Días </th>
                <td mat-cell *matCellDef="let element"> {{element.dias}} </td>
            </ng-container>

            <ng-container matColumnDef="turno">
                <th mat-header-cell *matHeaderCellDef> Turno </th>
                <td mat-cell *matCellDef="let element"> {{element.turno}} </td>
            </ng-container>

            <ng-container matColumnDef="acciones">
                <th mat-header-cell *matHeaderCellDef> ... </th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button style="color: #4caf50;" (click)="onAsignarAOtros(element)"
                        matTooltip="Asignar a otros">
                        <mat-icon>add</mat-icon>
                    </button>
                    <button mat-icon-button style="color: #ffc107;" (click)="onEditarHorario(element)">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="onEliminarHorario(element)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator itemsPerPageLabel="Itens por pagina" [pageSize]="15" [pageSizeOptions]="[15, 25, 50, 100]"
            style="width: 100%" showFirstLastButtons></mat-paginator>
    </div>
</app-generic-list>
