<div class="history-header" fxLayout="row" fxLayoutAlign="start center" fxLayoutGap="12px">
  <mat-icon>history</mat-icon>
  <h3>Últimas Solicitudes</h3>
</div>

<div class="history-content">
  <div class="history-table-container">
    <div class="empty-state" *ngIf="false">
      <mat-icon>receipt_long</mat-icon>
      <p>No hay solicitudes recientes</p>
    </div>

    <table mat-table [dataSource]="ultimasSolicitudes" class="table-premium w-100"
      *ngIf="ultimasSolicitudes && ultimasSolicitudes.length > 0">
      <ng-container matColumnDef="ref">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let element" class="table-id-cell"> Ref. #{{element.id}} </td>
      </ng-container>
      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef> Descripción </th>
        <td mat-cell *matCellDef="let element">
          <span class="table-desc-text">{{element.descripcion}}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef style="text-align: right;"> Reimprimir </th>
        <td mat-cell *matCellDef="let element" style="text-align: right;">
          <button mat-icon-button color="primary" matTooltip="Reimprimir"
            (click)="reimprimir(element.id, element.sucursalId)">
            <mat-icon>print</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="history-table-row"></tr>
    </table>
  </div>

  <mat-paginator [length]="totalElementos" [pageSize]="tamanoPagina" [pageSizeOptions]="[15, 25, 50, 100]"
    [pageIndex]="paginaActual" (page)="onPageChange($event)"
    *ngIf="ultimasSolicitudes && ultimasSolicitudes.length > 0" style="padding: 0 24px; background: transparent;">
  </mat-paginator>
</div>
