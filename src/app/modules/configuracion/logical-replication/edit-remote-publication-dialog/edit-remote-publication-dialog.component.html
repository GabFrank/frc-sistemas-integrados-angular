<div class="dialog-container">
  <h2 mat-dialog-title>{{ data.isEdit ? 'Editar' : 'Crear' }} Publicación Remota</h2>
  
  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>
  
  <form [formGroup]="form" (ngSubmit)="onSave()">
    <div class="form-content">
      <!-- Publication Name -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nombre de la Publicación</mat-label>
        <input matInput formControlName="publicationName" [readonly]="data.isEdit">
        <mat-hint *ngIf="!data.isEdit">Nombre generado automáticamente</mat-hint>
        <mat-error *ngIf="form.get('publicationName').hasError('required')">
          El nombre de la publicación es obligatorio
        </mat-error>
      </mat-form-field>
      
      <!-- Tables Selection -->
      <div class="tables-section">
        <div class="tables-header">
          <h3>Tablas a Replicar</h3>
          <button type="button" mat-button color="primary" (click)="toggleAllTables()">
            {{ form.get('selectedTables').value.length === availableTables.length ? 'Deseleccionar Todas' : 'Seleccionar Todas' }}
          </button>
        </div>
        
        <mat-error *ngIf="form.get('selectedTables').hasError('required') && form.get('selectedTables').touched">
          Debe seleccionar al menos una tabla
        </mat-error>
        
        <div class="tables-grid">
          <div *ngIf="isLoadingTables" class="tables-loading">
            <mat-spinner diameter="30"></mat-spinner>
          </div>
          <div *ngIf="!isLoadingTables">
            <mat-selection-list formControlName="selectedTables" #tablesList>
              <mat-list-option *ngFor="let table of availableTables" [value]="table">
                {{ table }}
              </mat-list-option>
            </mat-selection-list>
          </div>
        </div>
      </div>
    </div>
    
    <div class="dialog-actions">
      <button type="button" mat-button (click)="onCancel()" [disabled]="isLoading">Cancelar</button>
      <button type="submit" mat-raised-button color="primary" [disabled]="form.invalid || isLoading">
        <mat-spinner diameter="20" *ngIf="isLoading" style="display: inline-block; margin-right: 8px;"></mat-spinner>
        {{ data.isEdit ? 'Actualizar' : 'Crear' }}
      </button>
    </div>
  </form>
</div>
