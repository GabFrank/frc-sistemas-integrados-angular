<div mat-dialog-title>
    <div fxLayout="row" fxLayoutAlign="space-between center">
        <div fxLayout="row" fxLayoutAlign="start center" fxLayoutGap="10px">
            <span class="titulo" style="color: white;">BUSCAR MODELO</span>
        </div>
    </div>
</div>

<mat-divider style="opacity: 0.1;"></mat-divider>

<mat-dialog-content style="min-height: 400px; padding-top: 20px;">
    <div fxLayout="column" fxLayoutGap="15px">
        <div fxLayout="row" fxLayoutAlign="start center" fxLayoutGap="15px">
            <mat-form-field fxFlex appearance="outline" class="search-field">
                <mat-label>Marca o Modelo</mat-label>
                <input matInput [formControl]="buscarControl" placeholder="Ej: Toyota Hilux" autocomplete="off">
                <mat-icon matSuffix>search</mat-icon>
            </mat-form-field>

            <button mat-raised-button color="accent" (click)="onAdicionar()">
                <mat-icon>add</mat-icon>
                ADICIONAR
            </button>
        </div>
        <div class="table-container mat-elevation-z2">
            <table mat-table [dataSource]="dataSource" style="width: 100%">
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef style="width: 60px;"> ID </th>
                    <td mat-cell *matCellDef="let modelo"> {{ modelo.id }} </td>
                </ng-container>

                <ng-container matColumnDef="marca">
                    <th mat-header-cell *matHeaderCellDef> Marca </th>
                    <td mat-cell *matCellDef="let modelo"> {{ modelo.marca?.descripcion | uppercase }} </td>
                </ng-container>

                <ng-container matColumnDef="modelo">
                    <th mat-header-cell *matHeaderCellDef> Modelo </th>
                    <td mat-cell *matCellDef="let modelo"> {{ modelo.descripcion | uppercase }} </td>
                </ng-container>

                <ng-container matColumnDef="acciones">
                    <th mat-header-cell *matHeaderCellDef style="width: 100px; text-align: center;"> ... </th>
                    <td mat-cell *matCellDef="let modelo" style="text-align: center;">
                        <button mat-flat-button color="primary" (click)="onSelectModelo(modelo)">
                            SELECCIONAR
                        </button>
                    </td>
                </ng-container>

                <ng-container matColumnDef="editarEliminar">
                    <th mat-header-cell *matHeaderCellDef style="width: 120px; text-align: center;"> Acciones </th>
                    <td mat-cell *matCellDef="let modelo" style="text-align: center;">
                        <button mat-icon-button color="warn" (click)="onEliminarModelo(modelo)" style="color: red;">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="element-row"
                    (dblclick)="onSelectModelo(row)"></tr>
            </table>

            <div *ngIf="dataSource.data.length === 0 && !isSearching"
                style="padding: 40px; text-align: center; opacity: 0.5;">
                <mat-icon style="font-size: 48px; width: 48px; height: 48px;">sentiment_dissatisfied</mat-icon>
                <p>No se encontraron modelos</p>
            </div>
        </div>


    </div>
</mat-dialog-content>

<mat-dialog-actions fxLayout="row" fxLayoutAlign="end center" style="padding: 15px 24px;">
    <button mat-button (click)="onCancelar()">CANCELAR</button>
</mat-dialog-actions>
