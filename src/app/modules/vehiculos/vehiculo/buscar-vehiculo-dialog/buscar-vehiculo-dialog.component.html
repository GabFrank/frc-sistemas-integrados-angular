<h2 mat-dialog-title>Buscar Vehículo</h2>
<mat-dialog-content>
    <div fxLayout="column" fxLayoutGap="10px">
        <mat-form-field appearance="outline" style="width: 100%;">
            <mat-label>Buscar</mat-label>
            <input matInput [formControl]="buscarControl" placeholder="Buscar por marca, modelo o chapa"
                autocomplete="off" cdkFocusInitial>
            <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>

        <div class="table-container">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width: 100%;">
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef> Id </th>
                    <td mat-cell *matCellDef="let element"> {{element.id}} </td>
                </ng-container>

                <ng-container matColumnDef="marca">
                    <th mat-header-cell *matHeaderCellDef> Marca </th>
                    <td mat-cell *matCellDef="let element"> {{element.modelo?.marca?.descripcion | uppercase}} </td>
                </ng-container>
                <ng-container matColumnDef="modelo">
                    <th mat-header-cell *matHeaderCellDef> Modelo </th>
                    <td mat-cell *matCellDef="let element"> {{element.modelo?.descripcion | uppercase}} </td>
                </ng-container>
                <ng-container matColumnDef="chapa">
                    <th mat-header-cell *matHeaderCellDef> Chapa </th>
                    <td mat-cell *matCellDef="let element"> {{element.chapa | uppercase}} </td>
                </ng-container>
                <ng-container matColumnDef="acciones">
                    <th mat-header-cell *matHeaderCellDef></th>
                    <td mat-cell *matCellDef="let element" style="text-align: center;">
                        <button mat-icon-button color="primary" (click)="onSelect(element)">
                            <mat-icon>check_circle</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onSelect(row)" class="row-hover">
                </tr>
            </table>
            <div *ngIf="isSearching"
                style="display: flex; justify-content: center; align-items: center; padding: 20px;">
                <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
            </div>
            <div *ngIf="!isSearching && dataSource.data.length === 0" style="text-align: center; padding: 20px;">
                No se encontraron vehículos.
            </div>
        </div>
    </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="onCancelar()">Cancelar</button>
</mat-dialog-actions>
