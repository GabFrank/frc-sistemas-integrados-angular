<app-generic-list [data]="dataSource.data" (filtrar)="onFiltrar()" (resetFiltro)="resetFiltro()"
    (adicionar)="onAdicionar()" [isAdicionar]="true">
    <div filtros>
        <div fxLayout="row wrap" fxLayoutAlign="start center" fxLayoutGap="10px" style="width: 100%">
            <div fxFlex="40%">
                <mat-form-field style="width: 90%">
                    <mat-label>IMEI, Modelo o Vehículo</mat-label>
                    <input #buscar type="text" matInput [formControl]="filtroControl" (keyup.enter)="onFiltrar()" />
                </mat-form-field>
            </div>
        </div>
    </div>
    <div table style="height: 100%; background-color: rgb(70, 70, 70)" fxLayout="column"
        fxLayoutAlign="space-between start">
        <table mat-table [dataSource]="dataSource" multiTemplateDataRows class="mat-elevation-z8" style="width: 100%">
            <ng-container matColumnDef="id" style="width: 5%">
                <th mat-header-cell *matHeaderCellDef style="text-align: center; width: 5%">
                    Id
                </th>
                <td mat-cell *matCellDef="let gps" style="text-align: center; width: 5%">
                    {{ gps?.id }}
                </td>
            </ng-container>

            <ng-container matColumnDef="imei">
                <th mat-header-cell *matHeaderCellDef style="text-align: center">
                    IMEI
                </th>
                <td mat-cell *matCellDef="let gps" style="text-align: center">
                    {{ gps?.imei }}
                </td>
            </ng-container>

            <ng-container matColumnDef="modelo">
                <th mat-header-cell *matHeaderCellDef style="text-align: center">
                    Modelo Tracker
                </th>
                <td mat-cell *matCellDef="let gps" style="text-align: center">
                    {{ gps?.modeloTracker | uppercase }}
                </td>
            </ng-container>

            <ng-container matColumnDef="sim">
                <th mat-header-cell *matHeaderCellDef style="text-align: center">
                    Sim Numero
                </th>
                <td mat-cell *matCellDef="let gps" style="text-align: center">
                    {{ gps?.simNumero }}
                </td>
            </ng-container>

            <ng-container matColumnDef="vehiculo">
                <th mat-header-cell *matHeaderCellDef style="text-align: center">
                    Vehiculo
                </th>
                <td mat-cell *matCellDef="let gps" style="text-align: center">
                    {{ gps?.vehiculo?.chapa | uppercase }}
                </td>
            </ng-container>

            <ng-container matColumnDef="estado">
                <th mat-header-cell *matHeaderCellDef style="text-align: center">
                    Estado
                </th>
                <td mat-cell *matCellDef="let gps" style="text-align: center">
                    <mat-icon [style.color]="gps?.activo ? '#4caf50' : '#f44336'">
                        {{ gps?.activo ? 'check_circle' : 'cancel' }}
                    </mat-icon>
                </td>
            </ng-container>

            <ng-container matColumnDef="acciones">
                <th mat-header-cell *matHeaderCellDef style="width: 5%; text-align: center">
                    ...
                </th>
                <td mat-cell *matCellDef="let gps; let i = index" style="text-align: center; width: 5%">
                    <button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
                        <mat-icon>more_vert</mat-icon>
                    </button>
                    <mat-menu #menu="matMenu">
                        <button mat-menu-item (click)="onEditar(gps)">
                            Editar
                        </button>
                        <button mat-menu-item (click)="onEliminar(gps)">
                            Eliminar
                        </button>
                    </mat-menu>
                </td>
            </ng-container>

            <mat-divider></mat-divider>

            <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns; let i = dataIndex"></tr>
        </table>
        <mat-paginator itemsPerPageLabel="Itens por pagina" [pageSizeOptions]="[15, 25, 50, 100]"
            (page)="handlePageEvent($event)" [length]="totalElements" style="width: 100%"
            showFirstLastButtons></mat-paginator>
    </div>
</app-generic-list>
