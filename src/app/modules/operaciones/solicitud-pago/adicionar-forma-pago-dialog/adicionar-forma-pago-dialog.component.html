<div class="dialog-container">
  <h2 mat-dialog-title class="titulo-center font-medium">Adicionar forma de pago</h2>

  <mat-dialog-content>
    <form [formGroup]="form">
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Moneda *</mat-label>
          <mat-select formControlName="monedaId">
            <mat-option *ngFor="let m of monedaList" [value]="m.id">{{ m.denominacion }}</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Forma de pago *</mat-label>
          <mat-select formControlName="formaPagoId">
            <mat-option *ngFor="let f of formaPagoList" [value]="f.id">{{ f.descripcion }}</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline" class="valor-field">
          <mat-label>Valor *</mat-label>
          <input matInput type="number" formControlName="valor" min="0" step="1" />
        </mat-form-field>
        <mat-form-field *ngIf="mostrarCotizacion" appearance="outline" class="valor-field">
          <mat-label>Cotización</mat-label>
          <input matInput type="number" formControlName="cotizacion" min="0" step="0.0001" />
        </mat-form-field>
      </div>
      <div class="form-row" *ngIf="mostrarCamposCheque">
        <mat-form-field appearance="outline">
          <mat-label>Fecha emisión cheque</mat-label>
          <input matInput [matDatepicker]="pickerCheque" formControlName="fechaEmisionCheque" />
          <mat-datepicker-toggle matSuffix [for]="pickerCheque"></mat-datepicker-toggle>
          <mat-datepicker #pickerCheque></mat-datepicker>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Fecha de pago</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="fechaPago" />
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
      </div>
      <div class="form-row" *ngIf="!mostrarCamposCheque">
        <mat-form-field appearance="outline">
          <mat-label>Fecha de pago</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="fechaPago" />
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
      </div>
      <div class="form-row bloque-cheque" *ngIf="mostrarCamposCheque">
        <mat-form-field appearance="outline" class="portador-field">
          <mat-label>Portador</mat-label>
          <input matInput formControlName="portador" />
        </mat-form-field>
        <mat-checkbox formControlName="nominal">Nominal</mat-checkbox>
        <mat-checkbox formControlName="diferido">Diferido</mat-checkbox>
      </div>
      <div class="form-row">
        <mat-form-field appearance="outline" class="observaciones-field">
          <mat-label>Observación</mat-label>
          <input matInput formControlName="observacion" />
        </mat-form-field>
      </div>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancelar()">Cancelar</button>
    <button mat-raised-button color="primary" (click)="onConfirmar()" [disabled]="!form.valid">
      Agregar
    </button>
  </mat-dialog-actions>
</div>
