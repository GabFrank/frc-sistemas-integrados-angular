<div class="dialog-container">
  <h2 mat-dialog-title class="titulo-center font-medium">Adicionar nota</h2>

  <mat-dialog-content>
    <div class="filtro-row">
      <mat-form-field appearance="outline" class="filtro-field">
        <mat-label>Filtrar por número de nota</mat-label>
        <input
          matInput
          [(ngModel)]="filtroTexto"
          (keydown.enter)="onFiltroBuscar()"
          placeholder="Ej: 123"
        />
        <button matSuffix mat-icon-button (click)="onFiltroBuscar()" type="button" title="Buscar">
          <mat-icon>search</mat-icon>
        </button>
      </mat-form-field>
    </div>

    <div class="table-wrapper" *ngIf="!loading">
      <table mat-table [dataSource]="dataSource" class="table-center mat-elevation-z1">
        <ng-container matColumnDef="select">
          <th mat-header-cell *matHeaderCellDef>
            <mat-checkbox
              [checked]="allSelectedOnPage"
              [indeterminate]="selectedNotasList.length > 0 && !allSelectedOnPage"
              (change)="toggleAllOnPage()"
            >
            </mat-checkbox>
          </th>
          <td mat-cell *matCellDef="let row">
            <mat-checkbox
              [checked]="selectedIdsMap[row.id]"
              (change)="toggleNota(row)"
            >
            </mat-checkbox>
          </td>
        </ng-container>
        <ng-container matColumnDef="proveedor">
          <th mat-header-cell *matHeaderCellDef>Proveedor</th>
          <td mat-cell *matCellDef="let row">{{ row.proveedorNombreDisplay }}</td>
        </ng-container>
        <ng-container matColumnDef="numero">
          <th mat-header-cell *matHeaderCellDef>Número</th>
          <td mat-cell *matCellDef="let row">{{ row.numero }}</td>
        </ng-container>
        <ng-container matColumnDef="fecha">
          <th mat-header-cell *matHeaderCellDef>Fecha</th>
          <td mat-cell *matCellDef="let row">{{ row.fecha | date:'dd/MM/yyyy' }}</td>
        </ng-container>
        <ng-container matColumnDef="valorTotal">
          <th mat-header-cell *matHeaderCellDef>Valor total</th>
          <td mat-cell *matCellDef="let row">{{ row.valorTotal | number:'1.0-0' }}</td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayedColumns.length">
            No hay notas disponibles o ya fueron agregadas.
          </td>
        </tr>
      </table>
      <mat-paginator
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [pageSizeOptions]="[10, 20, 30]"
        (page)="onPage($event)"
        showFirstLastButtons
      >
      </mat-paginator>
    </div>

    <div *ngIf="loading" class="loading-wrapper">
      <mat-spinner diameter="40"></mat-spinner>
      <p>Cargando notas disponibles...</p>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancelar()">Cancelar</button>
    <button mat-raised-button color="primary" (click)="onAdicionarSeleccionadas()" type="button">
      Adicionar seleccionadas
    </button>
  </mat-dialog-actions>
</div>
