<div class="dialog-container">
  <!-- Dialog Header with App's Standard Gradient -->
  <div class="dialog-header">
    <h3>{{ data.titulo }}</h3>
  </div>

  <!-- Main Content -->
  <div class="dialog-content" fxLayout="column" fxLayoutGap="24px">

    <!-- Summary Section -->
    <div class="summary-section">
      <div class="section-header">
        <div class="section-icon">📋</div>
        <h4>Resumen del Pedido</h4>
      </div>
      
      <div class="summary-grid">
        <div class="summary-item highlight" *ngIf="data.proveedor">
          <span class="item-label">Proveedor</span>
          <span class="item-value">{{ data.proveedor.denominacion }}</span>
        </div>
        
        <div class="summary-item" *ngIf="data.vendedor">
          <span class="item-label">Vendedor</span>
          <span class="item-value">{{ data.vendedor.persona?.nombre || 'N/A' }}</span>
        </div>
        
        <div class="summary-item" *ngIf="data.formaPago">
          <span class="item-label">Forma de Pago</span>
          <span class="item-value">{{ data.formaPago.descripcion }}</span>
        </div>
        
        <div class="summary-item">
          <span class="item-label">Cantidad de Items</span>
          <span class="item-value">{{ data.cantidadItems }} productos</span>
        </div>
        
        <div class="summary-item highlight">
          <span class="item-label">Valor Total</span>
          <span class="item-value">{{ monedaDisplayValue }}</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Dialog Actions -->
  <div class="dialog-actions" fxLayout="row" fxLayoutAlign="end center" fxLayoutGap="12px">
    <button 
      mat-button 
      (click)="onCancel()">
      Cancelar
    </button>
    <button 
      mat-raised-button 
      color="primary"
      (click)="onConfirm()">
      Aceptar
    </button>
  </div>
</div>
