<div
  fxLayout="row"
  style="width: 100%; height: 80%"
  fxLayoutAlign="center center"
>
  <div fxFlex="60" fxLayout="column">
    <div
      fxFlex
      fxLayout="row wrap"
      fxLayoutAlign="start start"
      fxLayoutGap="10px"
    >
      <div fxFlex="25%" style="height: 200px">
        <app-boton
          nombre="Lista de compras"
          icon="shopping_cart"
          [iconSize]="4"
          (clickEvent)="onListCompras()"
        ></app-boton>
      </div>
      <div fxFlex="25%" style="height: 200px">
        <app-boton
          nombre="Lista de Proveedores"
          icon="store"
          [iconSize]="4"
          (clickEvent)="onListProveedores()"
        ></app-boton>
      </div>
      <div fxFlex="25%" style="height: 200px">
        <app-boton
          nombre="Lista de Vendedores"
          icon="person"
          [iconSize]="4"
          (clickEvent)="onListVendedores()"
        ></app-boton>
      </div>
    </div>
  </div>
</div>
