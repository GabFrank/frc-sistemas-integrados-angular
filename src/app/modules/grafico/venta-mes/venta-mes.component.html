<div class="venta-mes-container">
    <div class="filtros-container">
        <mat-form-field appearance="outline">
            <mat-label>Sucursal</mat-label>
            <mat-select [formControl]="sucursalControl">
                <mat-option [value]="null">Todas las Sucursales</mat-option>
                <mat-option *ngFor="let sucursal of sucursales$ | async" [value]="sucursal.id">
                    {{sucursal.nombre}}
                </mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Año</mat-label>
            <mat-select [formControl]="anhoControl">
                <mat-option *ngFor="let anho of anhos" [value]="anho">
                    {{anho}}
                </mat-option>
            </mat-select>
        </mat-form-field>

        <button mat-icon-button color="warn" (click)="limpiarFiltros()" matTooltip="Limpiar Filtros">
            <mat-icon>filter_alt_off</mat-icon>
        </button>
    </div>

    <div class="grafico-wrapper" *ngIf="datos$ | async as datos; else cargandoTpl">
        <div echarts [options]="datos.opciones" class="echarts-contenedor"></div>

        <div class="resumen-container">
            <div class="resumen-card" *ngFor="let item of datos.resumen; let i = index">
                <span class="label">{{item.label}}</span>
                <span class="valor" [class.anterior]="i === 1">{{item.valor}}</span>
            </div>
        </div>
    </div>

    <ng-template #cargandoTpl>
        <div class="loading-container" *ngIf="cargando$ | async">
            <mat-spinner diameter="50"></mat-spinner>
            <p>Cargando estadísticas...</p>
        </div>
    </ng-template>
</div>
