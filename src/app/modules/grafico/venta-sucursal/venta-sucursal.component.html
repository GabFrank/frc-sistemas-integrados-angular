<div class="h-full w-full flex flex-col gap-4 p-4 bg-[#303030]">
    <div class="flex flex-wrap gap-4 items-center bg-[#424242] p-4 rounded-lg shadow-md">

        <mat-form-field appearance="outline" class="w-32">
            <mat-label>Año</mat-label>
            <mat-select [formControl]="anhoControl">
                <mat-option *ngFor="let anho of anhos" [value]="anho">
                    {{anho}}
                </mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-40">
            <mat-label>Mes</mat-label>
            <mat-select [formControl]="mesControl">
                <mat-option [value]="null">Todos</mat-option>
                <mat-option *ngFor="let mes of meses" [value]="mes.valor">
                    {{mes.nombre}}
                </mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-40">
            <mat-label>Fecha Específica</mat-label>
            <input matInput [matDatepicker]="picker" [formControl]="fechaControl">
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <button mat-icon-button color="warn" (click)="limpiarFiltros()" matTooltip="Limpiar filtros">
            <mat-icon>filter_alt_off</mat-icon>
        </button>

        <div *ngIf="cargando$ | async" class="ml-auto">
            <mat-spinner diameter="30"></mat-spinner>
        </div>
    </div>

    <div class="flex-1 bg-[#424242] rounded-lg shadow-md p-4 min-h-[500px] relative">
        <div *ngIf="datos$ | async as datos; else noData" class="h-full w-full">
            <div *ngIf="datos.hayDatos; else emptyState" echarts [options]="datos.opciones" class="h-full w-full"></div>

            <ng-template #emptyState>
                <div class="h-full w-full flex items-center justify-center text-gray-400 text-lg">
                    No hay datos para mostrar en este período
                </div>
            </ng-template>
        </div>

        <ng-template #noData>
            <div class="h-full w-full flex items-center justify-center text-gray-400">
                Seleccione filtros para visualizar datos
            </div>
        </ng-template>
    </div>
</div>
