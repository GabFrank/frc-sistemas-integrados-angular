<div class="notifications-board" cdkDropListGroup>
    <ng-container *ngIf="{ notificaciones: notificaciones$ | async, pagination: paginationState$ | async } as data">
        <ng-container *ngFor="let estado of ESTADOS_TABLERO">
            <div class="notifications-column">
                <div class="notifications-column-header">
                    <span>{{ ESTADOS_LABELS[estado] }}</span>
                    <span class="notifications-column-count" [ngClass]="estado">{{ data.notificaciones[estado]?.length
                        || 0
                        }}</span>
                </div>
                <div class="notifications-column-body" cdkDropList [cdkDropListData]="data.notificaciones[estado]"
                    (cdkDropListDropped)="drop($event, estado)">
                    <ng-container *ngIf="!data.pagination[estado]?.loading; else loadingTemplate">
                        <div *ngFor="let n of data.notificaciones[estado]" class="notification-item"
                            [class.unread]="!n.leida" (click)="onNotificationClick(n)" cdkDrag>

                            <div class="notification-drag-placeholder" *cdkDragPlaceholder></div>

                            <div class="notification-header-row"
                                style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <div class="notification-header">
                                    {{ n.notificacion?.titulo }}
                                </div>
                                <div style="display: flex; align-items: center; gap: 4px;">
                                    <button mat-icon-button *ngIf="!n.leida" (click)="markAsRead(n, $event)"
                                        matTooltip="Marcar como leída">
                                        <mat-icon style="font-size: 18px;">check_circle_outline</mat-icon>
                                    </button>
                                </div>
                            </div>
                            <div class="notification-message">
                                {{ n.notificacion?.mensaje }}
                            </div>
                            <div class="notification-footer" style="justify-content: space-between;">
                                <span>{{ n.notificacion?.tipo }}</span>
                                <span>{{ n.notificacion?.creadoEn | date:'short' }}</span>
                            </div>
                        </div>
                    </ng-container>
                    <ng-template #loadingTemplate>
                        <div class="loading-indicator">
                            <mat-spinner diameter="30"></mat-spinner>
                        </div>
                    </ng-template>
                </div>
                <div class="notifications-column-paginator" *ngIf="data.pagination[estado]?.length > 0">
                    <mat-paginator [length]="data.pagination[estado]?.length"
                        [pageSize]="data.pagination[estado]?.pageSize" [pageSizeOptions]="pageSizeOptions"
                        [pageIndex]="data.pagination[estado]?.pageIndex" (page)="onPageChange($event, estado)"
                        showFirstLastButtons [disabled]="data.pagination[estado]?.loading">
                    </mat-paginator>
                </div>
            </div>
        </ng-container>
    </ng-container>
</div>
