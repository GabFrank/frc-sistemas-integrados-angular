<div #container fxLayout="column" style="width: 100%; height: 100%; padding: 10px" fxLayoutGap="10px">
  <div style="width: 100%; text-align: center; font-size: large">
    {{ data.titulo }}
  </div>
  <div fxLayout="row" style="width: 100%" fxLayoutGap="10px">
    <div fxFlex="80%" style="width: 100%">
      <mat-form-field style="width: 100%">
        <mat-label>Buscar</mat-label>
        <input type="text" matInput [formControl]="buscarControl" (keyup.enter)="onBuscar()" />
      </mat-form-field>
    </div>
    <div fxFlex="20%" fxLayout="column" fxLayoutGap="10px">
      <button mat-raised-button color="primary" style="width: 100%" (click)="onBuscar()">
        Buscar
      </button>
      <button *ngIf="data?.isAdicionar" mat-raised-button color="primary" style="width: 100%" (click)="onAdicionar()">
        + Adicionar
      </button>
    </div>
  </div>
  <div fxFlex fxLayout="column" fxLayoutAlign="space-between center">
    <div fxFlex style="width: 100%; overflow: auto; min-height: 400px; max-height: 500px;">
      <table mat-table #table [dataSource]="dataSource" class="mat-elevation-z8" style="width: 100%;">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef style="width: 100px; text-align: center">ID</th>
          <td mat-cell *matCellDef="let element" style="text-align: center">{{ element?.id }}</td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef style="width: 250px; text-align: center">Nombre</th>
          <td mat-cell *matCellDef="let element" style="text-align: center">{{ element?.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="descripcion">
          <th mat-header-cell *matHeaderCellDef>Descripción</th>
          <td mat-cell *matCellDef="let element">{{ element?.descripcion }}</td>
        </ng-container>

        <ng-container matColumnDef="codigo">
          <th mat-header-cell *matHeaderCellDef>Código</th>
          <td mat-cell *matCellDef="let element">{{ element?.codigo }}</td>
        </ng-container>

        <ng-container matColumnDef="documento">
          <th mat-header-cell *matHeaderCellDef>Documento</th>
          <td mat-cell *matCellDef="let element">{{ element?.documento }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns" style="height: 48px;"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns; let i = dataIndex" (click)="onRowSelect(row)"
          (keyup.enter)="onRowSelect(row)" [class.selected]="selectedItem == row" class="tableRows" #tableRows
          tabindex="0" style="height: 48px; cursor: pointer;"></tr>
      </table>
    </div>
    <mat-paginator *ngIf="data?.paginator" itemsPerPageLabel="Itens por pagina" [pageSizeOptions]="[15, 25, 50, 100]"
      (page)="handlePageEvent($event)" [length]="selectedPageInfo?.getTotalElements" [pageSize]="pageSize"
      [pageIndex]="pageIndex" style="width: 100%" showFirstLastButtons></mat-paginator>
    <br />
    <div style="width: 100%; text-align: center">
      <button mat-raised-button (click)="onCancelar()" color="primary" style="width: 200px">
        Cancelar
      </button>
      <button mat-raised-button (click)="onAceptar()" color="accent" [disabled]="selectedItem == null"
        style="width: 200px; margin-left: 20px">
        Aceptar
      </button>
    </div>
  </div>
</div>
