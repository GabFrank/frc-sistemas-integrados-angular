<div #container fxLayout="column" style="width: 100%; height: 100%; padding: 10px" fxLayoutGap="10px" class="search-dialog-container">
  <!-- Título centrado -->
  <div style="width: 100%; text-align: center; margin-bottom: 20px;">
    <h3 style="margin: 0;">{{ data.titulo }}</h3>
  </div>
  
  <!-- Barra de búsqueda -->
  <div fxLayout="row" style="width: 100%; margin-bottom: 20px;" fxLayoutGap="10px">
    <div fxFlex="80%" style="width: 100%">
      <mat-form-field style="width: 100%">
        <mat-label>Buscar</mat-label>
        <input type="text" matInput [formControl]="buscarControl" (keyup.enter)="onBuscar()" />
      </mat-form-field>
    </div>
    <div fxFlex="20%" fxLayout="column" fxLayoutGap="10px">
      <button mat-raised-button color="primary" style="width: 100%" (click)="onBuscar()">
        Buscar
      </button>
      <button *ngIf="data?.isAdicionar" mat-raised-button color="primary" style="width: 100%" (click)="onAdicionar()">
        + Adicionar
      </button>
    </div>
  </div>
  
  <!-- Tabla -->
  <div fxFlex fxLayout="column" fxLayoutAlign="space-between start" style="min-height: 300px;">
    <div fxFlex style="width: 100%; overflow: auto; min-height: 300px;">
      <table mat-table #table [dataSource]="dataSource" class="mat-elevation-z8" style="width: 100%;">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef style="text-align: center">Id</th>
          <td mat-cell *matCellDef="let element" style="text-align: center">{{ element?.id }}</td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef style="text-align: start">Nombre</th>
          <td mat-cell *matCellDef="let element" style="text-align: start">{{ element?.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="descripcion">
          <th mat-header-cell *matHeaderCellDef style="text-align: center">Ciudad</th>
          <td mat-cell *matCellDef="let element" style="text-align: center">
            <span *ngIf="element?.ciudad">{{ element?.ciudad?.nombre || element?.ciudad }}</span>
            <span *ngIf="!element?.ciudad">{{ element?.descripcion }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="codigo">
          <th mat-header-cell *matHeaderCellDef>Código</th>
          <td mat-cell *matCellDef="let element">{{ element?.codigo }}</td>
        </ng-container>

        <ng-container matColumnDef="documento">
          <th mat-header-cell *matHeaderCellDef>Documento</th>
          <td mat-cell *matCellDef="let element">{{ element?.documento }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns" style="height: 48px;"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns; let i = dataIndex" (click)="onRowSelect(row)"
          (keyup.enter)="onRowSelect(row)" [class.selected]="selectedItem == row" class="tableRows" #tableRows
          tabindex="0" style="height: 48px; cursor: pointer;"></tr>
      </table>
    </div>
    
    <!-- Paginación -->
    <mat-paginator 
      *ngIf="data?.paginator || selectedPageInfo" 
      itemsPerPageLabel="Items per page:" 
      [pageSizeOptions]="[15, 25, 50, 100]"
      (page)="handlePageEvent($event)" 
      [length]="selectedPageInfo?.getTotalElements || 0" 
      [pageSize]="pageSize"
      [pageIndex]="pageIndex" 
      style="width: 100%" 
      showFirstLastButtons>
    </mat-paginator>
    
    <!-- Botones de acción -->
    <div style="width: 100%; text-align: center; margin-top: 20px;">
      <button mat-raised-button (click)="onCancelar()" color="warn" style="width: 200px; margin-right: 20px;">
        Cancelar
      </button>
      <button mat-raised-button (click)="onAceptar()" [disabled]="selectedItem == null"
        style="width: 200px; background-color: #424242; color: white;">
        Aceptar
      </button>
    </div>
  </div>
</div>
