<div style="height: 100vh">
  <app-header (toogleSideBarEvent)="toggleSideNav()" (openNotificationsEvent)="openNotifications()"></app-header>

  <mat-drawer-container [hasBackdrop]="false">
    <mat-drawer mode="side" [opened]="true" class="side-drawer">
      <app-side-mini-variant [isExpanded]="sideBarOpen" (toggleSideNav)="setSideNav($event)"></app-side-mini-variant>
    </mat-drawer>
    <mat-drawer mode="over" position="end" [(opened)]="notificationsOpen" class="notifications-drawer">
      <div class="notifications-content">
        <div class="notifications-title">
          Notificaciones
        <button mat-raised-button color="primary" class="btn-crear-notificacion" (click)="crearNotificacion()">
          <mat-icon>add</mat-icon>
          <span>Crear Notificacion</span>
        </button>
      </div>
        <div class="notifications-scroll">
          <app-notification-board></app-notification-board>
        </div>
        <ng-template #noNotifications>
          <div class="no-notifications">
            No hay nuevas notificaciones
          </div>
        </ng-template>
      </div>
    </mat-drawer>
    <mat-drawer-content style="overflow: hidden;">
      <mat-tab-group class="main-tab-group mt-2" [selectedIndex]="selectedTab" (selectedTabChange)="tabChanged($event)"
        style="width: 100%" mat-stretch-tabs="false">
        <mat-tab class="mat-tab-class" *ngFor="let tab of tabs; let tabIndex = index" style="width: 100%; height: 100%">
          <ng-template mat-tab-label style="height: 2em !important;">
            <div fxLayout="row" fxLayoutAlign="start center" style="width: 100%">
              <div fxFlex="70" matTooltip="{{ tab.title }}" class="tab-label-text">
                {{ tab.title }}
              </div>
              <div fxFlex="30">
                <mat-icon style="font-size: 1em" (click)="removeTab(tabIndex)">close</mat-icon>
              </div>
            </div>
          </ng-template>
          <div style="padding-top: 10px; height: calc(100% - 2em)">
            <div fxLayout="row" fxLayoutAlign="center center" style="width: 100%; height: 100%">
              <div fxFlex="100" style="overflow-y: hidden; overflow-x: hidden; height: 100%">
                <app-tab-content [tab]="tab"></app-tab-content>
              </div>
            </div>
          </div>
        </mat-tab>
      </mat-tab-group>
    </mat-drawer-content>
  </mat-drawer-container>
</div>
